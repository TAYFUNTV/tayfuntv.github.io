<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAYFUN TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

/* YATAY KATEGORİ MENÜ */

.kategori-bar{
display:flex;
overflow-x:auto;
white-space:nowrap;
background:#111;
padding:8px;
}

.kategori-bar button{
flex:0 0 auto;
background:#333;
color:white;
border:none;
padding:10px 15px;
margin-right:8px;
border-radius:6px;
font-size:14px;
}

/* PLAYER */

#video{
width:100%;
aspect-ratio:16/9;
background:black;
}

/* KANAL LİSTESİ */

.kanallar{
display:none;
padding:10px;
}

.kanallar button{
display:block;
width:95%;
margin:6px auto;
background:#222;
color:white;
border:none;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<!-- YATAY KATEGORİ -->

<div class="kategori-bar">

<button onclick="toggle('spor')">SPOR</button>
<button onclick="toggle('belgesel')">BELGESEL</button>
<button onclick="toggle('ulusal')">ULUSAL</button>
<button onclick="toggle('yerel')">YEREL</button>
<button onclick="toggle('sinema')">SİNEMA</button>

</div>

<!-- PLAYER -->

<video id="video" controls autoplay></video>

<!-- KANALLAR -->

<div id="spor" class="kanallar">
<button onclick="oynat('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">SPORT TEST</button>
</div>

<div id="belgesel" class="kanallar">
<button onclick="oynat('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">DISCOVERY</button>
</div>

<div id="ulusal" class="kanallar">
<button onclick="oynat('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TRT 1</button>
</div>

<div id="yerel" class="kanallar">
<button onclick="oynat('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">YEREL TV</button>
</div>

<div id="sinema" class="kanallar">
<button onclick="oynat('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">SİNEMA TV</button>
</div>

<script>

var video = document.getElementById("video");
var hls;

function oynat(url){

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});

}

}

/* KATEGORİ AÇ / KAPAT */

function toggle(id){

var list = document.getElementsByClassName("kanallar");

for(var i=0;i<list.length;i++){
list[i].style.display="none";
}

document.getElementById(id).style.display="block";

}

</script>

</body>
</html>
