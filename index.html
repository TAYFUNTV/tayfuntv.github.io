<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAYFUN TV</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

.kategori-bar{
display:flex;
overflow-x:auto;
background:#111;
padding:8px;
}

.kategori-bar button{
flex:0 0 auto;
background:#333;
color:white;
border:none;
padding:10px 15px;
margin-right:8px;
border-radius:6px;
}

#video{
width:100%;
height:55vh;
background:black;
}

.kanallar{
display:none;
padding:10px;
}

.kanallar button{
display:block;
width:90%;
margin:6px auto;
background:#222;
color:white;
border:none;
padding:10px;
border-radius:6px;
text-align:left;
}

.logo{
height:35px;
vertical-align:middle;
margin-right:8px;
}

@media screen and (orientation:landscape){

#video{
height:100vh;
}

.kategori-bar{
display:none;
}

}

</style>
</head>

<body>

<div class="kategori-bar">

<button onclick="toggle('ulusal')">ULUSAL</button>
<button onclick="toggle('spor')">SPOR</button>

</div>

<video id="video" controls autoplay playsinline></video>

<!-- ULUSAL -->

<div id="ulusal" class="kanallar">

<button onclick="oynat('http://129.151.196.133/Tivizon.php?ID=kanald')">
KANAL D
</button>

<button onclick="oynat('http://129.151.196.133/Tivizon.php?ID=atv')">
ATV
</button>

<button onclick="oynat('http://129.151.196.133/Tivizon.php?ID=nowtv')">
NOW
</button>

<button onclick="oynat('http://129.151.196.133/Tivizon.php?ID=foxtv')">
FOX
</button>

<button onclick="oynat('http://129.151.196.133/Tivizon.php?ID=startv')">
STAR TV
</button>

</div>

<!-- SPOR -->

<div id="spor" class="kanallar">

<button onclick="oynat('https://saran-live.ercdn.net/natgeohd/index.m3u8')">
TEST KANAL
</button>

</div>

<script>

var video = document.getElementById("video");

function oynat(url){
video.src = url;
video.play();
}

function toggle(id){

var list=document.getElementsByClassName("kanallar");

for(var i=0;i<list.length;i++){
list[i].style.display="none";
}

document.getElementById(id).style.display="block";

}

</script>

</body>
</html>
