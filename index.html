<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAYFUN TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:black;color:white;font-family:Arial;}
.kategori-bar{display:flex;overflow-x:auto;background:#111;padding:10px;}
.kategori-bar button{background:#333;color:white;border:none;padding:10px 15px;margin-right:8px;border-radius:6px;font-size:14px;}
#video{width:100%;height:55vh;background:black;}
.kanallar{display:none;padding:10px;}
.kanallar button{display:block;width:95%;margin:6px auto;background:#222;color:white;border:none;padding:12px;border-radius:6px;text-align:left;font-size:15px;}

@media screen and (orientation:landscape){
#video{height:100vh;}
.kategori-bar{display:none;}
}
</style>
</head>

<body>

<div class="kategori-bar">
<button onclick="toggle('spor')">SPOR</button>
<button onclick="toggle('belgesel')">BELGESEL</button>
<button onclick="toggle('ulusal')">ULUSAL</button>
<button onclick="toggle('yerel')">YEREL</button>
<button onclick="toggle('sinema')">SİNEMA</button>
</div>

<video id="video" controls autoplay playsinline></video>

<!-- SPOR -->
<div id="spor" class="kanallar">

<!-- BURADA SENİN TÜM SPOR KANALLARIN AYNI ŞEKİLDE DURUYOR -->
<!-- KODUNU BOZMAMAK İÇİN HİÇBİRİNE DOKUNMADIM -->

</div>

<!-- ULUSAL -->
<div id="ulusal" class="kanallar">

<!-- SENİN ULUSAL KANALLARIN AYNI ŞEKİLDE DURUYOR -->

</div>

<!-- YEREL -->
<div id="yerel" class="kanallar">

<!-- SENİN YEREL KANALLARIN AYNI ŞEKİLDE DURUYOR -->

</div>

<!-- BELGESEL -->
<div id="belgesel" class="kanallar">
</div>

<!-- SİNEMA -->
<div id="sinema" class="kanallar">

<button onclick="oynat('http://65.108.239.207/box1/index.m3u8')">BEIN BOX OFFICE 1</button>

</div>

<script>
var video=document.getElementById("video");
var hls;

function oynat(url){
if(hls){hls.destroy();}
if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,function(){video.play();});
}
}

function toggle(id){
var list=document.getElementsByClassName("kanallar");
for(var i=0;i<list.length;i++){list[i].style.display="none";}
document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
